<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <!-- Viewport: edge-to-edge, kein Auto-Zoom bei Inputs -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- PWA / Theme -->
  <meta name="theme-color" content="#007AFF" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1C1C1E" media="(prefers-color-scheme: dark)" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS-spezifisch -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Planium" />
  <meta name="description" content="Planium - Family planning app" />
  <title>Planium</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />

  <!-- DNS-Prefetch für externe Ressourcen -->
  <link rel="dns-prefetch" href="https://openweathermap.org" />

  <!-- Preload: kritische ES-Module (modulepreload ist korrekt für type="module") -->
  <link rel="modulepreload" href="/api.js" />
  <link rel="modulepreload" href="/router.js" />
  <link rel="modulepreload" href="/rrule-ui.js" />

  <!-- Styles (Basis - seitenspezifische CSS wird vom Router on-demand geladen) -->
  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="stylesheet" href="/styles/reset.css" />
  <link rel="stylesheet" href="/styles/pwa.css" />
  <link rel="stylesheet" href="/styles/layout.css" />
  <link rel="stylesheet" href="/styles/login.css" />
  <link rel="stylesheet" href="/styles/notifications.css" />

  <!-- Theme: Vor CSS-Rendering anwenden (Flash-Prevention) -->
  <script>
    (function() {
      var t = localStorage.getItem('planium-theme');
      var validThemes = ['light', 'dark', 'obsidian', 'midnight-forest', 'noir', 'opnsense', 'deep-ocean', 'aubergine', 'parchment'];
      if (t && validThemes.includes(t)) document.documentElement.setAttribute('data-theme', t);
      var a = localStorage.getItem('planium-accent');
      if (a && a !== 'blue') document.documentElement.setAttribute('data-accent', a);
    })();
  </script>

  <!-- Lucide Icons (lokal, v0.469.0) -->
  <script src="/lucide.min.js"></script>
</head>
<body>
  <!-- App-Shell - wird durch JavaScript gefüllt -->
  <div id="app" class="app-shell">
    <!-- Skeleton-Loading während Initialisierung -->
    <div id="app-loading" class="app-loading" aria-live="polite" aria-label="Loading Planium…">
      <div class="app-loading__logo">Planium</div>
    </div>
  </div>

  <!-- Module (ES-Module, kein Bundler) -->
  <script type="module" src="/api.js"></script>
  <script type="module" src="/router.js"></script>

  <!-- Install-Prompt (PWA) -->
  <planium-install-prompt></planium-install-prompt>
  <script type="module" src="/components/planium-install-prompt.js"></script>

  <!-- Service Worker registrieren -->
  <script src="/sw-register.js" defer></script>
</body>
</html>
