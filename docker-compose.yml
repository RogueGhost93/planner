services:
  planium:
    build: .
    container_name: planium
    restart: unless-stopped
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      - planium_data:/data
      # Optional: bind-mount Filebox-Ordner vom Host, um Dateien direkt
      # vom Host aus reinzuziehen oder zu sichern. Erst aktivieren, nachdem
      # ein Nutzer Filebox in den Settings eingeschaltet hat (dann werden
      # die Unterordner automatisch angelegt). Beispiel:
      - ./files/global:/data/filebox/global
      - ./files/test:/data/filebox/test
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/planium.db
      # Auf false setzen wenn kein HTTPS/Reverse-Proxy (direkter HTTP-Zugriff)
      - SESSION_SECURE=false
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  planium_data:
    driver: local
